name: Minevia
version: 2.3.73
main: ac.grim.grimac.platform.bukkit.GrimACBukkitLoaderPlugin
description: "Libre simulation anticheat designed for 1.21 with 1.8–1.21 support,\
  \ powered by PacketEvents 2.0."
author: GrimAC
website: https://grim.ac/
permissions:
  grim.alerts:
    description: Receive alerts for violations
    default: op
  grim.alerts.enable-on-join:
    description: Enable alerts on join
    default: op
  grim.brand:
    description: Show client brands on join
    default: op
  grim.brand.enable-on-join:
    description: Enable showing client brands on join
    default: op
  grim.exempt:
    description: Exempt from all checks
    default: "false"
  grim.list:
    description: Shows lists of specific data
    default: "false"
  grim.nomodifypacket:
    description: Disable modifying packets
    default: "false"
  grim.nosetback:
    description: Disable setback
    default: "false"
  grim.performance:
    description: Check performance metrics
    default: op
  grim.profile:
    description: Check user profile
    default: op
  grim.sendalert:
    description: Send cheater alert
    default: op
  grim.verbose:
    description: Receive verbose alerts for violations
    default: op
  grim.verbose.enable-on-join:
    description: Enable verbose alerts on join
    default: "false"
api-version: "1.13"
softdepend:
  - ProtocolLib
  - ProtocolSupport
  - Essentials
  - ViaVersion
  - ViaBackwards
  - ViaRewind
  - Geyser-Spigot
  - floodgate
  - FastLogin
  - PlaceholderAPI
folia-supported: true
